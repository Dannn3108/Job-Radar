# ============================================================
# Job Radar 備用設定(v2 起,主設定在 Google Sheet「Keywords & Filters」)
# 此檔僅在 Sheet 讀取失敗時作為 fallback 使用,平常不需要維護。
# 「留在 yaml 的技術參數」(signals / request_delay / max_pages)仍以此檔為準。
# ============================================================

keyword_groups:
  procurement:
    - 採購
    - procurement
    - sourcing
    - 資材
    - commodity
  supply_chain:
    - 供應鏈
    - supply chain
    - S&OP
    - 供應鏈管理師

# 全台(留空 = 不限地區)
areas: []

jobexp: ""

exclude_title_keywords:
  - 倉儲
  - 理貨
  - 儲備幹部
  - 處長
  - 副總

exclude_companies:
  - 人事顧問
  - 萬寶華
  - 藝珂
  - 旅行社

watchlist:
  - 台灣積體電路製造股份有限公司
  - 台達電子工業股份有限公司
  - 德州儀器工業股份有限公司
  - 台灣美光晶圓科技股份有限公司

# ---- 技術參數(不搬 Sheet,以此為準) ----
signals:
  velocity:
    min_new_jobs: 3
    growth_pct: 100
  discovery:
    window_days: 30
    min_jobs: 3

request_delay_seconds: 2.5
max_pages_per_keyword: 5

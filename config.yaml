# ============================================================
# Job Radar 設定檔 — 改這裡就好,不用動程式碼
# ============================================================

# 關鍵字組:每組會分別統計(WoW、公司訊號都以組為單位)
keyword_groups:
  procurement:
    - 採購
    - procurement
    - sourcing
    - 資材
    - commodity
  supply_chain:
    - 供應鏈
    - supply chain
    - S&OP
    - 供應鏈管理師

# 104 地區代碼(可多選)。
# 怎麼查:在 104 網頁用地區篩選後,看網址列的 area= 參數,直接複製過來即可。
# 6001001000 台北市 / 6001002000 新北市
areas:
  - "6001001000"
  - "6001002000"

# 年資篩選(104 jobexp 參數,留空 = 不限)
# 常見值: "1"=1年以下, "3"=1-3年, "5"=3-5年
jobexp: ""

# 職缺標題含以下字樣就排除(避免倉儲、資深主管職洗版)
exclude_title_keywords:
  - 倉儲
  - 理貨
  - 儲備幹部
  - 處長
  - 副總

# ---- 訊號觸發規則 ----
signals:
  # WoW 招募加速:本週新增 >= min_new 且較上週成長 >= growth_pct
  velocity:
    min_new_jobs: 3
    growth_pct: 100        # +100% = 翻倍
  # 公司發現:30 天內符合關鍵字職缺數 >= 門檻,且不在 watchlist
  discovery:
    window_days: 30
    min_jobs: 3

# Watchlist:已鎖定的目標公司(discovery 不會重複建議這些)
watchlist:
  - 台灣積體電路製造股份有限公司
  - 台達電子工業股份有限公司
  - 德州儀器工業股份有限公司
  - 台灣美光晶圓科技股份有限公司

# 每次 API 請求間隔秒數(當個有禮貌的使用者)
request_delay_seconds: 2.5
# 每個關鍵字最多抓幾頁(一頁約 20-30 筆)
max_pages_per_keyword: 5
